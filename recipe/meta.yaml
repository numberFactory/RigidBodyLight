package:
  name: rigidbodylight
  version: {{ GIT_DESCRIBE_TAG }}

source:
  git_url: ..

build:
  number: 0
  string: py{{ CONDA_PY }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}
  script: "{{ PYTHON }} -m pip install . -vv"
  skip: True # [win]
  skip: True # [py<39]
    
requirements:

  build:
    - {{ compiler('cxx') }}
    - cmake >=3.19
    - make
    - python
    - pybind11
    - eigen
    - pip
  host:
    - scikit-build-core
    - python
    - numpy >=2.0
    - nanobind
    - eigen
  run:
    - python
    - numpy >=2.0

test:
  imports:
    - RigidBody
  commands:
    - pytest
  requires:
    - pytest
    - pandas
    - numpy
  source_files:
    - tests/

about:
  home: https://github.com/brennansprinkle/Rigid_Body_Light
  license_family: MIT
  license_file: LICENSE
  summary: A lightweight code for fluctuating rigid body dynamics at the Brownian scale.

extra:
  recipe-maintainers:
    - rykerfish